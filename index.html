<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="scroll-container">

      <section class="page" id="intro">
        <div class="page__content">
          <img class="intro__photo" src="assets/images/personal.jpg" alt="Photo" />
          <div class="intro__text">
            <h1 class="intro__name">Your Name</h1>
            <p class="intro__title">Software Engineer</p>
          </div>
        </div>
      </section>

      <section class="page" id="stack">
        <div class="page__content">
          <h2 class="section__heading">Stack &amp; Education</h2>
          <div class="stack__grid">
            <div class="stack__item">TypeScript</div>
            <div class="stack__item">React</div>
            <div class="stack__item">Node.js</div>
            <div class="stack__item">PostgreSQL</div>
          </div>
          <div class="education">
            <p class="education__degree">BSc Computer Science</p>
            <p class="education__school">University Name · 2024</p>
          </div>
        </div>
      </section>

      <section class="page" id="projects">
        <div class="page__content">
          <h2 class="section__heading">Projects</h2>
          <div class="project">
            <img class="project__image" src="assets/images/project1.png" alt="Project screenshot" />
            <div class="project__info">
              <h3 class="project__name">Project Name</h3>
              <p class="project__description">Short description of the project and what problem it solves.</p>
              <div class="project__links">
                <a class="btn" href="#">GitHub</a>
                <a class="btn" href="#">Live</a>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="page" id="contact">
        <div class="page__content">
          <h2 class="section__heading">Contact</h2>
          <div class="contact__links">
            <a class="contact__link" href="mailto:you@example.com">you@example.com</a>
            <a class="contact__link" href="#">GitHub</a>
            <a class="contact__link" href="#">LinkedIn</a>
          </div>
        </div>
      </section>

    </main>

    <script src="js/main.js"></script>
  </body>
</html>
